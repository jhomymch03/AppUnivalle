org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Desactiva la compilacion incremental de Kotlin: el proyecto vive en J: y la
# cache de plugins (url_launcher_android, etc.) en C:, y el compilador
# incremental falla al relativizar rutas entre unidades distintas ("different
# roots"). Sin incremental el build es un poco mas lento pero no rompe.
kotlin.incremental=false
